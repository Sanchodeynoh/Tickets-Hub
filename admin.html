<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — TICKETS HUB</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --purple-deep: #1a0a2e;
      --purple-mid: #3d1a6e;
      --purple-bright: #7c3aed;
      --purple-glow: #a855f7;
      --gold: #f59e0b;
      --white: #fafafa;
      --gray-light: #d1d5db;
      --gray-mid: #6b7280;
      --dark-card: #120826;
      --border: rgba(124,58,237,0.25);
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
      --sidebar-w: 240px;
      --luminous-green: #22c55e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0e0620;
      color: var(--white);
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: rgba(18,8,38,0.98);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 200;
      transition: transform 0.3s ease;
    }
    .sidebar-logo {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; letter-spacing: 0.08em;
      color: var(--white); text-decoration: none;
    }
    .logo-text span { color: var(--purple-glow); }
    .logo-badge {
      display: inline-block; margin-top: 0.35rem;
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      color: var(--gold); border-radius: 4px;
      padding: 0.15rem 0.5rem;
    }

    .sidebar-nav {
      flex: 1; padding: 1rem 0;
      overflow-y: auto;
    }
    .nav-section-label {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gray-mid); padding: 0.75rem 1.5rem 0.35rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 1.5rem; cursor: pointer;
      font-size: 0.85rem; font-weight: 500;
      color: var(--gray-mid); border: none;
      background: none; width: 100%; text-align: left;
      transition: all 0.2s; border-left: 3px solid transparent;
    }
    .nav-item:hover { color: var(--white); background: rgba(124,58,237,0.08); }
    .nav-item.active {
      color: var(--white); background: rgba(124,58,237,0.12);
      border-left-color: var(--purple-bright);
    }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .admin-profile {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .admin-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--luminous-green);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
    }
    .admin-name { 
      font-size: 0.83rem; font-weight: 600;
      color: var(--luminous-green);
      text-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
    }
    .admin-role { font-size: 0.7rem; color: var(--gray-mid); }
    .btn-logout {
      width: 100%; padding: 0.55rem;
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--gray-mid);
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* Top bar with Hi Admin greeting */
    .topbar {
      height: 64px; padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(14,6,32,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .page-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 0.04em;
    }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    
    /* LUMINOUS GREEN COMMANDING GREETING */
    .admin-greeting {
      font-family: 'Oswald', 'Bebas Neue', sans-serif;
      font-size: 1.2rem; 
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--luminous-green);
      text-shadow: 0 0 10px rgba(34, 197, 94, 0.7), 0 0 25px rgba(34, 197, 94, 0.5);
      animation: glowPulse 2s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 10px rgba(34, 197, 94, 0.7), 0 0 25px rgba(34, 197, 94, 0.5); }
      50% { text-shadow: 0 0 15px rgba(34, 197, 94, 1), 0 0 35px rgba(34, 197, 94, 0.7); }
    }

    .hamburger-admin {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .hamburger-admin span { display: block; width: 22px; height: 2px; background: var(--white); border-radius: 2px; }

    /* Content */
    .content { padding: 2rem; flex: 1; }

    /* ── TABS ── */
    .tab-nav {
      display: flex; gap: 0.5rem; margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 0.55rem 1.2rem;
      border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--gray-mid);
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn:hover { border-color: rgba(168,85,247,0.4); color: var(--white); }
    .tab-btn.active {
      background: var(--purple-bright); border-color: var(--purple-bright);
      color: var(--white);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── STAT CARDS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: rgba(18,8,38,0.8);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 1.25rem 1.5rem;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(168,85,247,0.35); }
    .stat-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-mid); margin-bottom: 0.5rem; }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; line-height: 1; margin-bottom: 0.25rem; }
    .stat-value.purple { color: var(--purple-glow); }
    .stat-value.gold { color: var(--gold); }
    .stat-value.green { color: var(--success); }

    /* Section header */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; flex-wrap: wrap; gap: 1rem;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; letter-spacing: 0.04em;
    }

    /* Add Event button */
    .btn-add-event {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      background: var(--purple-bright); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 0 20px rgba(124,58,237,0.35);
    }
    .btn-add-event:hover { background: var(--purple-glow); transform: translateY(-1px); }

    /* Responsive */
    @media (max-width: 860px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .hamburger-admin { display: flex; }
    }
    @media (max-width: 560px) {
      .content { padding: 1.5rem; }
      .topbar { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="#" class="logo-text">TICKETS <span>HUB</span></a>
      <div class="logo-badge">ADMIN</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">MAIN</div>
      <button class="nav-item active" onclick="switchTab('dashboard')">
        <span class="nav-icon">📊</span> Dashboard
      </button>
      <button class="nav-item" onclick="switchTab('events')">
        <span class="nav-icon">🎫</span> Manage Events
      </button>
      <button class="nav-item" onclick="switchTab('orders')">
        <span class="nav-icon">📋</span> Orders
      </button>
      <button class="nav-item" onclick="switchTab('add-event')">
        <span class="nav-icon">➕</span> Add Event
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="admin-profile">
        <div class="admin-avatar" id="adminAvatar">S</div>
        <div>
          <div class="admin-name" id="adminNameSidebar">Sancho</div>
          <div class="admin-role">Administrator</div>

      </div>
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </aside>

  <div class="main">

    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger-admin" onclick="toggleSidebar()">
          <span></span><span></span><span></span>
        </button>
        <h1 class="page-heading" id="pageHeading">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <span class="admin-greeting" id="adminGreeting">Hi Admin Sancho</span>
      </div>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- Dashboard Tab -->
      <div id="dashboard" class="tab-panel active">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Events</div>
            <div class="stat-value purple" id="totalEvents">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending Orders</div>
            <div class="stat-value gold" id="pendingOrders">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Confirmed Orders</div>
            <div class="stat-value green" id
